{% extends "base.html" %}

{% block title %}Editar Produto{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2 class="page-title">Editar Produto</h2>
    <p class="page-subtitle">Ajuste grupo, unidade, barracão padrão e estoque mínimo.</p>
  </div>
  <div>
    <a href="{{ url_for('produtos') }}" class="btn btn-outline-secondary">Voltar</a>
  </div>
</div>

<div class="content-card">
  <div class="content-card-body">
    <form method="POST" class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Código</label>
        <input type="text" class="form-control" value="{{ produto[1] }}" disabled>
      </div>
      <div class="col-md-8">
        <label class="form-label">Descrição</label>
        <input type="text" class="form-control" value="{{ produto[2] }}" disabled>
      </div>

      <div class="col-md-4">
        <label class="form-label">Unidade de medida</label>
        <input type="text" name="unidade" class="form-control" value="{{ produto[3] }}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Estoque mínimo</label>
        <input type="number" step="0.01" min="0" name="estoque_minimo" class="form-control" value="{{ produto[4] }}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Barracão padrão</label>
        <input type="text" name="barracao" class="form-control" value="{{ produto[6] }}">
      </div>

      <div class="col-12">
        <label class="form-label">Grupo</label>
        <input type="text" name="grupo" class="form-control" value="{{ produto[5] }}">
      </div>

      <div class="col-12">
        <button type="submit" class="btn btn-warning fw-bold">Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
