{% extends "base.html" %}

{% block title %}Novo Produto{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2 class="page-title">Novo Produto</h2>
    <p class="page-subtitle">Cadastro de produto no estoque.</p>
  </div>
  <div>
    <a href="{{ url_for('produtos') }}" class="btn btn-outline-secondary">Voltar</a>
  </div>
</div>

<div class="content-card">
  <div class="content-card-body">
    <form method="POST" class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Código</label>
        <input type="text" name="codigo" class="form-control" required>
      </div>
      <div class="col-md-8">
        <label class="form-label">Descrição</label>
        <input type="text" name="descricao" class="form-control" required>
      </div>

      <div class="col-md-3">
        <label class="form-label">Unidade</label>
        <input type="text" name="unidade" class="form-control" value="UN" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Estoque mínimo</label>
        <input type="number" step="0.01" min="0" name="estoque_minimo" class="form-control" value="0">
      </div>
      <div class="col-md-3">
        <label class="form-label">Saldo B1</label>
        <input type="number" step="0.01" min="0" name="saldo_b1" class="form-control" value="0">
      </div>
      <div class="col-md-3">
        <label class="form-label">Saldo B2</label>
        <input type="number" step="0.01" min="0" name="saldo_b2" class="form-control" value="0">
      </div>

      <div class="col-md-6">
        <label class="form-label">Grupo</label>
        <input type="text" name="grupo" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Barracão padrão</label>
        <input type="text" name="barracao" class="form-control" placeholder="Ex.: B1">
      </div>

      <div class="col-12">
        <button type="submit" class="btn btn-warning fw-bold">Salvar Produto</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
