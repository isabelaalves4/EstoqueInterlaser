{% extends "base.html" %}

{% block title %}Nova Solicitação{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2 class="page-title">Nova Solicitação de Saída</h2>
    <p class="page-subtitle">Solicitar material ao estoque</p>
  </div>
  <div>
    <a href="{{ url_for('solicitacoes') }}" class="btn btn-outline-secondary">Voltar</a>
  </div>
</div>

<div class="content-card">
  <div class="content-card-body">
    <form method="POST" class="row g-3">
      <div class="col-12">
        <label class="form-label">Produto</label>
        <select name="produto" class="form-select" required>
          <option value="">Selecione</option>
          {% for p in produtos %}
          <option value="{{ p[0] }}">{{ p[1] }} - {{ p[2] }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">Quantidade</label>
        <input type="number" step="0.01" min="0.01" name="quantidade" class="form-control" required>
      </div>

      <div class="col-12">
        <button type="submit" class="btn btn-warning fw-bold">Salvar Solicitação</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
