<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Estoque</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh; margin: 0; background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
      display: flex; align-items: center; justify-content: center; font-family: Arial, Helvetica, sans-serif;
    }
    .login-card {
      width: 100%; max-width: 430px; background: #fff; border: 1px solid #e5e7eb; border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0,0,0,.08); padding: 30px;
    }
    .login-title { font-size: 30px; font-weight: 700; margin: 0 0 24px; text-align: center; }
    .form-control, .input-group-text { min-height: 52px; border-radius: 14px; }
    .btn-dark { min-height: 52px; border-radius: 14px; font-weight: 700; }
    .toggle-btn { cursor: pointer; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="login-title">Entrar</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" autocomplete="off">
      <div class="mb-3">
        <label class="form-label">Usuário</label>
        <input type="text" name="usuario" class="form-control" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">Senha</label>
        <div class="input-group">
          <input type="password" id="senha" name="senha" class="form-control" required>
          <button class="btn btn-outline-secondary toggle-btn" type="button" onclick="toggleSenha()">Mostrar</button>
        </div>
      </div>
      <button type="submit" class="btn btn-dark w-100">Acessar sistema</button>
    </form>
  </div>

  <script>
    function toggleSenha() {
      const campo = document.getElementById('senha');
      const botao = event.currentTarget;
      const mostrando = campo.type === 'text';
      campo.type = mostrando ? 'password' : 'text';
      botao.textContent = mostrando ? 'Mostrar' : 'Ocultar';
    }
  </script>
</body>
</html>
